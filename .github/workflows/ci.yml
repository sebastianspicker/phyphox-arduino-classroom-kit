name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  xml:
    name: XML + phyphox validation
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install xmllint
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-utils

      - name: Validate XML + phyphox references
        run: bash scripts/validate-xml.sh

      - name: Rebuild *.phyphox from sources
        run: bash scripts/build-phyphox.sh

      - name: Ensure generated files are up to date
        run: git diff --exit-code

  arduino:
    name: Arduino compile
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Arduino CLI
        env:
          ARDUINO_CLI_VERSION: "1.4.1"
          ARDUINO_CLI_TAG: "v1.4.1"
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          url="https://github.com/arduino/arduino-cli/releases/download/${ARDUINO_CLI_TAG}/arduino-cli_${ARDUINO_CLI_VERSION}_Linux_64bit.tar.gz"
          curl -fL --retry 3 --retry-delay 2 "$url" -o /tmp/arduino-cli.tar.gz
          tar -xzf /tmp/arduino-cli.tar.gz -C /tmp
          install -m 0755 /tmp/arduino-cli "$HOME/.local/bin/arduino-cli"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Restore Arduino CLI cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.arduino15
            ~/Arduino/libraries
            ~/.cache/arduino
          key: arduino-cli-${{ runner.os }}-${{ hashFiles('scripts/compile-arduino.sh') }}

      - name: Compile sketches
        run: bash scripts/compile-arduino.sh

  security:
    name: Security baseline
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Secret scan
        run: bash scripts/secret-scan.sh

      - name: Dependency pin check
        run: bash scripts/deps-scan.sh

      - name: Minimal static checks
        run: bash scripts/sast-minimal.sh
